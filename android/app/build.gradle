apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.google.devtools.ksp'

android {
    namespace = "com.forta.chat"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.forta.chat"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def storeFilePath = System.getenv("RELEASE_STORE_FILE")
            if (storeFilePath) {
                storeFile file(storeFilePath)
                storePassword System.getenv("RELEASE_STORE_PASSWORD")
                keyAlias System.getenv("RELEASE_KEY_ALIAS")
                keyPassword System.getenv("RELEASE_KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            def releaseSigningConfig = signingConfigs.release
            if (releaseSigningConfig.storeFile != null) {
                signingConfig releaseSigningConfig
            }
        }
    }
    sourceSets {
        main {
            jniLibs.srcDirs 'jniLibs/'
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
            doNotStrip '*/*/libreverseproxy.so'
            doNotStrip '*/*/libtor.so'
            doNotStrip '*/*/libobfs4proxy.so'
            doNotStrip '*/*/libsnowflake.so'
            doNotStrip '*/*/libwebtunnel.so'
        }
    }
    lintOptions {
        disable 'NullSafeMutableLiveData'
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')

    // Auto-update: HTTP client + JSON parsing + coroutines
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2'

    // Native WebRTC — hardware-accelerated video/audio for calls
    implementation 'io.github.webrtc-sdk:android:144.7559.01'

    // Firebase Cloud Messaging — for native push handling when app is killed
    implementation 'com.google.firebase:firebase-messaging:25.0.1'

    //For cordova-plugin-tor-runner
    implementation "com.google.dagger:dagger:$daggerVersion"
    ksp "com.google.dagger:dagger-compiler:$daggerVersion"
    implementation "androidx.lifecycle:lifecycle-process:$lifecycleProcessVersion"
    implementation "com.jrummyapps:android-shell:$androidShellVersion"
    implementation "androidx.preference:preference-ktx:$androidxPreferenceVersion"

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
